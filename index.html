<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <span class="nav-logo" id="nav-logo">GJP</span>
            <ul class="nav-links">
                <li><a href="#about">About</a></li>
                <li><a href="#experience">Experience</a></li>
                <li><a href="#projects">Projects</a></li>
                <li><a href="#skills">Skills</a></li>
                <li><button class="btn-connect" id="open-modal-btn">Connect</button></li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero" id="about">
        <div class="hero-content">
            <div class="hero-text" id="hero-text">
                <!-- Rendered by script.js -->
            </div>
            <div class="hero-image">
                <div class="image-ring">
                    <img src="img/ProfilePicture.jpg" alt="Profile picture" class="profile-pic" id="profile-pic">
                </div>
            </div>
        </div>
        <div class="hero-scroll-hint">
            <span>scroll</span>
            <div class="scroll-line"></div>
        </div>
    </section>

    <!-- EXPERIENCE -->
    <section class="section" id="experience">
        <div class="section-container">
            <div class="section-header">
                <h2 class="section-title">Experience</h2>
                <div class="section-line"></div>
            </div>
            <div class="timeline" id="timeline">
                <!-- Rendered by script.js -->
            </div>
        </div>
    </section>

    <!-- EDUCATION -->
    <section class="section section-alt" id="education">
        <div class="section-container">
            <div class="section-header">
                <h2 class="section-title">Education</h2>
                <div class="section-line"></div>
            </div>
            <div class="education-grid" id="education-grid">
                <!-- Rendered by script.js -->
            </div>
        </div>
    </section>

    <!-- PROJECTS -->
    <section class="section" id="projects">
        <div class="section-container">
            <div class="section-header">
                <h2 class="section-title">Projects</h2>
                <div class="section-line"></div>
            </div>
            <div class="projects-grid" id="projects-grid">
                <!-- Rendered by script.js -->
            </div>
        </div>
    </section>

    <!-- SKILLS -->
    <section class="section section-alt" id="skills">
        <div class="section-container">
            <div class="section-header">
                <h2 class="section-title">Skills</h2>
                <div class="section-line"></div>
            </div>
            <div class="skills-grid" id="skills-grid">
                <!-- Rendered by script.js -->
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer" id="footer">
        <!-- Rendered by script.js -->
    </footer>

    <!-- SOCIAL MODAL -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <button class="modal-close" id="modal-close" aria-label="Close">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <h2 class="modal-title">Let's Connect</h2>
            <p class="modal-subtitle">Reach out — I'm always open to new opportunities and collaborations.</p>
            <div class="modal-links" id="modal-links">
                <!-- Rendered by script.js -->
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/js-yaml@4/dist/js-yaml.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
